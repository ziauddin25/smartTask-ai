<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect x="0" y="0" width="200" height="100" rx="44" fill="url(#glow)"/>
  <!-- Subtle border -->
  <rect x="3" y="3" width="194" height="194" rx="42" stroke="white" stroke-opacity="0.18" stroke-width="2" fill="none"/>

  <!-- Neural network nodes -->
  <!-- Center node -->
  <circle cx="100" cy="100" r="14" fill="white" fill-opacity="0.95"/>
  <!-- Outer nodes -->
  <circle cx="56" cy="72" r="9" fill="white" fill-opacity="0.8"/>
  <circle cx="144" cy="72" r="9" fill="white" fill-opacity="0.8"/>
  <circle cx="56" cy="128" r="9" fill="white" fill-opacity="0.8"/>
  <circle cx="144" cy="128" r="9" fill="white" fill-opacity="0.8"/>
  <!-- Far nodes -->
  <circle cx="36" cy="100" r="6" fill="white" fill-opacity="0.55"/>
  <circle cx="164" cy="100" r="6" fill="white" fill-opacity="0.55"/>
  <circle cx="100" cy="44" r="6" fill="white" fill-opacity="0.55"/>
  <circle cx="100" cy="156" r="6" fill="white" fill-opacity="0.55"/>

  <!-- Connection lines (neural edges) -->
  <line x1="100" y1="100" x2="56" y2="72" stroke="white" stroke-opacity="0.45" stroke-width="2"/>
  <line x1="100" y1="100" x2="144" y2="72" stroke="white" stroke-opacity="0.45" stroke-width="2"/>
  <line x1="100" y1="100" x2="56" y2="128" stroke="white" stroke-opacity="0.45" stroke-width="2"/>
  <line x1="100" y1="100" x2="144" y2="128" stroke="white" stroke-opacity="0.45" stroke-width="2"/>
  <line x1="56" y1="72" x2="36" y2="100" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="56" y1="128" x2="36" y2="100" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="144" y1="72" x2="164" y2="100" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="144" y1="128" x2="164" y2="100" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="56" y1="72" x2="100" y2="44" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="144" y1="72" x2="100" y2="44" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="56" y1="128" x2="100" y2="156" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>
  <line x1="144" y1="128" x2="100" y2="156" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- Center pulse ring -->
  <circle cx="100" cy="100" r="22" stroke="white" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  <circle cx="100" cy="100" r="30" stroke="white" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>
</svg>
